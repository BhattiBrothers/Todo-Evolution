apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image }}:{{ .Values.frontend.tag }}"
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.frontend.port }}
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "{{ .Values.frontend.env.nextPublicApiUrl }}"
            - name: NEXT_PUBLIC_APP_URL
              value: "{{ .Values.frontend.env.nextPublicAppUrl }}"
            - name: BETTER_AUTH_URL
              value: "{{ .Values.frontend.env.betterAuthUrl }}"
            - name: BETTER_AUTH_SECRET
              value: "{{ .Values.frontend.env.betterAuthSecret }}"
            - name: DATABASE_URL
              value: "{{ .Values.frontend.env.databaseUrl }}"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
